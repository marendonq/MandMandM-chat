# PostgreSQL + MongoDB de desarrollo compartidos por el equipo.
# Uso (desde la raíz del repo MandMandM):  docker compose up -d
# Parar:  docker compose down   (los datos siguen en el volumen)
#
# Si el puerto 5432 ya lo usa PostgreSQL en Windows, cambia "5432:5432" por "5433:5432"
# y en backend/.env usa el puerto 5433 en DATABASE_URL.
#
# MongoDB: conversaciones y mensajes (MONGO_URI / MONGO_DB_NAME en backend/.env).

services:
  mongo:
    image: mongo:7
    container_name: mandmandm-mongo
    ports:
      - "27017:27017"
    volumes:
      - mandmandm-mongo-data:/data/db

  postgres:
    image: postgres:16
    container_name: mandmandm-pg
    environment:
      POSTGRES_USER: mandmandm
      POSTGRES_PASSWORD: mandmandm
      POSTGRES_DB: mandmandm
    ports:
      - "5432:5432"
    volumes:
      - mandmandm-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mandmandm -d mandmandm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: mandmandm-redis
    ports:
      - "6379:6379"
    volumes:
      - mandmandm-redis-data:/data

volumes:
  mandmandm-pg-data:
  mandmandm-mongo-data:
  mandmandm-redis-data:
